[pytest]
# Configuració bàsica per Arrel AI tests

# Directori de tests
testpaths = tests

# Patró de fitxers de test
python_files = test_*.py

# Patró de funcions de test
python_functions = test_*

# Timeout per defecte (evitar tests penjats)
timeout = 60

# Mostrar output complet en fails
addopts = 
    -v
    --tb=short
    --strict-markers

# Markers personalitzats
markers =
    slow: Tests que triguen més de 10s
    requires_ollama: Tests que requereixen Ollama actiu
